<style>
  :root{
    --arang:#0A0A0A; --arang2:#141414; --kartu:#1a1a1a;
    --api:#E8352A; --api2:#ff4b3f;
    --teks:#f5f5f5; --teks2:#a3a3a3; --garis:#2a2a2a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Figtree',system-ui,-apple-system,sans-serif;background:var(--arang);color:var(--teks);-webkit-font-smoothing:antialiased}
  #gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(900px 500px at 50% -10%, rgba(232,53,42,.18), transparent 60%),var(--arang);overflow-y:auto}
  .card{width:100%;max-width:420px;background:linear-gradient(180deg,var(--kartu),var(--arang2));border:1px solid var(--garis);border-radius:20px;padding:34px 26px 26px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .brand{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:15px;letter-spacing:.3px;color:var(--teks2);margin-bottom:22px}
  .lock{width:62px;height:62px;margin:0 auto 18px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(232,53,42,.12);border:1px solid rgba(232,53,42,.35)}
  .lock svg{width:30px;height:30px;stroke:var(--api2)}
  h1{font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:23px;line-height:1.25;margin-bottom:8px}
  .sub{font-size:14px;color:var(--teks2);line-height:1.5;margin-bottom:24px}
  .sub b{color:var(--teks)}
  .field{position:relative;margin-bottom:14px}
  input{width:100%;padding:15px 16px;border-radius:13px;background:#0f0f0f;border:1.5px solid var(--garis);color:var(--teks);font-size:16px;font-family:'Figtree',sans-serif;letter-spacing:1.5px;text-align:center;text-transform:uppercase;transition:border-color .2s,box-shadow .2s}
  input::placeholder{letter-spacing:1px;text-transform:none;color:#555}
  input:focus{outline:none;border-color:var(--api);box-shadow:0 0 0 4px rgba(232,53,42,.12)}
  input.err{border-color:var(--api);animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  button{width:100%;padding:15px;border:none;border-radius:13px;cursor:pointer;background:linear-gradient(180deg,var(--api2),var(--api));color:#fff;font-size:16px;font-weight:700;font-family:'Figtree',sans-serif;letter-spacing:.3px;transition:transform .1s,opacity .2s}
  button:active{transform:scale(.98)}
  button:disabled{opacity:.6;cursor:wait}
  .msg{min-height:20px;font-size:13.5px;margin-top:12px;color:var(--api2);font-weight:500}
  .help{margin-top:22px;padding-top:18px;border-top:1px solid var(--garis);font-size:12.5px;color:var(--teks2);line-height:1.6}
  .help a{color:var(--api2);text-decoration:none;font-weight:600}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes rot{to{transform:rotate(360deg)}}
  #viewer{position:fixed;inset:0;z-index:1;display:none;background:var(--arang)}
  #frame{width:100%;height:100%;border:0;display:block}
  .hidden{display:none !important}
</style>
</head>
